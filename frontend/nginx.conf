upstream backend {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Qurilma rasmlari / yuklamalar uchun limit
    client_max_body_size 25m;

    # --- API ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (real-time eventlar) ---
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # uzoq ulanishlar uchun
    }

    # --- Static (Django admin/DRF) — whitenoise web servisida ---
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # --- Media (qurilma rasmlari) — umumiy volume'dan to'g'ridan-to'g'ri ---
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
    }

    # --- React SPA ---
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
