upstream backend {
    server web:8000;
}

# HTTP → HTTPS yo'naltirish
server {
    listen 80;
    server_name faceid.markaziyklinikkasalxona-statistika.uz;

    # Let's Encrypt tekshiruvi uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS asosiy server
server {
    listen 443 ssl;
    server_name faceid.markaziyklinikkasalxona-statistika.uz;

    ssl_certificate     /etc/letsencrypt/live/faceid.markaziyklinikkasalxona-statistika.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faceid.markaziyklinikkasalxona-statistika.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
